# Nginx server block for routing traffic to the HTML-to-PDF API
# Place this in /etc/nginx/sites-available/default (or a new file in sites-available)
# Then link it to sites-enabled

server {
    listen 80;
    listen [::]:80;
    
    server_name YOUR_SERVER_IP; # TODO: Replace with your actual server IP address

    # Because you set the Express limit to '50mb' for large HTML strings,
    # we must also increase the Nginx body size limit, otherwise Nginx will block it
    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:3000; # Proxy back to the Docker container or Node process running on 3000
        
        # Standard Next/Node Reverse Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Forwarding real IP and schema
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
